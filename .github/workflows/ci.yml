name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: signal-space-py
      - uses: actions/checkout@v4
        with:
          repository: signal-space/signal-space-spec
          path: signal-space-spec
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pytest ruff
      - run: PYTHONPATH=src python -m pytest -q tests
        working-directory: signal-space-py
      - run: ruff check .
        working-directory: signal-space-py
